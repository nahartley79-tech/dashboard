<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Racing Model — Version history</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050b18;--bg2:#0c1525;--bg3:#111e35;
  --bd:#1e3050;--bd2:#2a4060;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#a78bfa;
  --text:#e2e8f0;--muted:#64748b;--dim:#334155;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:200}
.topbar-left h1{font-size:18px;font-weight:800;color:#f8fafc}
.topbar-left p{font-size:11px;color:var(--muted);margin-top:2px}
.back-link{font-size:12px;color:var(--blue);text-decoration:none}
.back-link:hover{text-decoration:underline}
.wrap{max-width:800px;margin:0 auto;padding:20px}

.vcard{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:12px;text-decoration:none;transition:border-color .15s}
.vcard:hover{border-color:var(--bd2)}
.vcard-left{display:flex;flex-direction:column;gap:4px}
.vname{font-size:15px;font-weight:800;color:#f8fafc}
.vdesc{font-size:12px;color:var(--muted)}
.vbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px}
.vbadge-current{background:#14532d44;color:var(--green)}
.vbadge-prior{background:var(--bg3);color:var(--muted)}
.varrow{color:var(--muted);font-size:16px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>🧬 Racing model — version history</h1>
    <p>How the scoring signals and betting gates evolved, version by version</p>
  </div>
  <a class="back-link" href="dashboard.html">← Back to dashboard</a>
</div>

<div class="wrap">

<a class="vcard" href="model_v34.html">
  <div class="vcard-left">
    <div class="vname">v34</div>
    <div class="vdesc">MR1 reliability tracking layer — race type, field size, condition, distance</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="vbadge vbadge-current">current</span>
    <span class="varrow">→</span>
  </div>
</a>

<a class="vcard" href="model_v33.html">
  <div class="vcard-left">
    <div class="vname">v33</div>
    <div class="vdesc">Country heavy overlay cap replaces hard block</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="vbadge vbadge-prior">prior</span>
    <span class="varrow">→</span>
  </div>
</a>

</div>

</body>
</html>
